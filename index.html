<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A'lo Market Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { background: radial-gradient(circle at top, #1f1f1f 0%, #0d0d0d 100%); color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .smooth-gpu { transform: translate3d(0, 0, 0); backface-visibility: hidden; will-change: transform, opacity; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover .product-card-inner { transform: translateY(-8px) rotateX(4deg) rotateY(2deg); box-shadow: 0 20px 40px rgba(249, 115, 22, 0.15); }
        .btn-animate:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-[#141414]/90 backdrop-blur-md sticky top-0 z-40 px-4 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-orange-500 italic">A'lo Market</h1>
            <button onclick="openAdminPanel()" class="bg-orange-500 text-black px-4 py-2 rounded-xl text-xs font-bold">Admin</button>
        </div>
    </header>

    <!-- Katalog -->
    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div id="products-list" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
    </main>

    <!-- Buyurtma Modali -->
    <div id="order-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#181818] border border-gray-800 p-6 rounded-3xl w-full max-w-md shadow-2xl">
            <h3 class="text-2xl font-black text-orange-500 mb-4">Buyurtma</h3>
            <p id="modal-product-name" class="font-bold mb-2"></p>
            <p id="modal-product-price" class="text-2xl font-black text-orange-500 mb-4"></p>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="setPaymentType('cash')" id="pay-cash" class="py-3 rounded-xl bg-orange-500 text-black font-bold">Naqd pul</button>
                <button onclick="setPaymentType('card')" id="pay-card" class="py-3 rounded-xl bg-gray-800 text-white font-bold">Karta (-10%)</button>
            </div>

            <div id="card-details" class="hidden mb-4 p-4 bg-black/50 border border-orange-500/30 rounded-xl cursor-pointer" onclick="copyCardNumber()">
                <code class="text-xl font-bold">5614 6873 0683 5365</code>
                <span class="text-xs text-gray-400 block">Mahmudov M. (Nusxalash uchun bosing)</span>
            </div>

            <form id="order-form" onsubmit="sendTelegramOrder(event)" class="space-y-3">
                <input type="text" id="cust-name" required placeholder="Ismingiz..." class="w-full bg-[#0f0f0f] border border-gray-800 p-3 rounded-xl">
                <input type="tel" id="cust-phone" required placeholder="Telefoningiz..." class="w-full bg-[#0f0f0f] border border-gray-800 p-3 rounded-xl">
                <button type="submit" class="w-full bg-orange-500 text-black font-black py-4 rounded-xl">Tasdiqlash</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-modal" class="fixed inset-0 bg-black/85 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#181818] p-6 rounded-3xl w-full max-w-md">
            <form onsubmit="addNewProduct(event)" class="space-y-3">
                <input type="text" id="new-p-title" required placeholder="Nomi" class="w-full bg-[#0f0f0f] p-3 rounded-xl">
                <input type="number" id="new-p-price" required placeholder="Narxi" class="w-full bg-[#0f0f0f] p-3 rounded-xl">
                <input type="url" id="new-p-image" required placeholder="Rasm URL" class="w-full bg-[#0f0f0f] p-3 rounded-xl">
                <textarea id="new-p-desc" required placeholder="Tavsif" class="w-full bg-[#0f0f0f] p-3 rounded-xl"></textarea>
                <button type="submit" class="w-full bg-orange-500 text-black py-3 rounded-xl">Qo'shish</button>
            </form>
            <button onclick="closeAdminPanel()" class="w-full mt-3 text-gray-400">Yopish</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hurwvgjwjmyniescbyok.supabase.co';
        const SUPABASE_KEY = 'Sb_publishable_P2a2dR0U2PS8qZ4joayWBg_Tp8ISyqX'; 
        let currentProductPrice = 0;
        let selectedPayment = 'cash';

        function setPaymentType(type) {
            selectedPayment = type;
            document.getElementById('pay-cash').className = type === 'cash' ? "py-3 rounded-xl bg-orange-500 text-black font-bold" : "py-3 rounded-xl bg-gray-800 text-white font-bold";
            document.getElementById('pay-card').className = type === 'card' ? "py-3 rounded-xl bg-orange-500 text-black font-bold" : "py-3 rounded-xl bg-gray-800 text-white font-bold";
            document.getElementById('card-details').classList.toggle('hidden', type === 'cash');
            
            const priceEl = document.getElementById('modal-product-price');
            const finalPrice = type === 'card' ? currentProductPrice * 0.9 : currentProductPrice;
            priceEl.innerText = Math.round(finalPrice) + " so'm";
        }

        function copyCardNumber() {
            navigator.clipboard.writeText("5614687306835365");
            alert("Karta raqami nusxalandi!");
        }

        function openOrderModal(title, price) {
            currentProductPrice = price;
            document.getElementById('modal-product-name').innerText = title;
            setPaymentType('cash');
            document.getElementById('order-modal').classList.remove('hidden');
        }

        function addNewProduct(e) {
            e.preventDefault();
            const productData = {
                title_uz: document.getElementById('new-p-title').value,
                title_ru: document.getElementById('new-p-title').value,
                desc_uz: document.getElementById('new-p-desc').value,
                desc_ru: document.getElementById('new-p-desc').value,
                price: parseInt(document.getElementById('new-p-price').value),
                image: document.getElementById('new-p-image').value
            };

            fetch(`${SUPABASE_URL}/rest/v1/products`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(productData)
            }).then(() => { alert("Qo'shildi!"); location.reload(); });
        }

        function openAdminPanel() {
            if(prompt("Parol:") === '7777') document.getElementById('admin-modal').classList.remove('hidden');
        }

        function closeAdminPanel() { document.getElementById('admin-modal').classList.add('hidden'); }
    </script>
</body>
</html>
