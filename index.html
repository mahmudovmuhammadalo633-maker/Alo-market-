<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A'lo Market - Ultra Interactive</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome iconlar uchun -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; transition: transform 0.5s ease; }
        .card-3d:hover .preserve-3d { transform: rotateY(3deg) rotateX(3deg) translateZ(3px); }
        .bg-dark-gradient { background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }

        /* --- PROFESSIONAL BUBBLE FLIP ANIMATSIYASI --- */
        @keyframes bubbleFlipIn {
            0% {
                transform: scale(0.3) rotateY(-180deg) rotateX(-90deg);
                opacity: 0;
                filter: blur(10px);
            }
            50% {
                transform: scale(1.15) rotateY(45deg) rotateX(15deg);
                opacity: 0.8;
                filter: blur(2px);
            }
            75% {
                transform: scale(0.92) rotateY(-15deg);
                opacity: 0.9;
            }
            100% {
                transform: scale(1) rotateY(0deg) rotateX(0deg);
                opacity: 1;
                filter: blur(0px);
            }
        }

        .bubble-flip-in {
            animation: bubbleFlipIn 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Orqa fon xiralashishi */
        .lightbox-bg {
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
        }
    </style>
</head>
<body class="bg-dark-gradient text-gray-100 font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-[#1a1a1a] border-b border-orange-500/20 sticky top-0 z-50 backdrop-blur-md bg-opacity-90">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-orange-600 to-yellow-500 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-orange-500/30">
                    A
                </div>
                <span class="text-2xl font-black bg-gradient-to-r from-orange-500 to-yellow-400 bg-clip-text text-transparent tracking-wider">A'lo Market</span>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="bg-[#242424] rounded-xl p-1 flex border border-gray-700">

                    <button id="lang-ru" onclick="changeLanguage('ru')" class="px-3 py-1 rounded-lg text-xs font-bold transition">RU</button>
                </div>

                <button onclick="toggleAdminModal()" class="bg-gradient-to-r from-orange-600 to-orange-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-orange-500/20 hover:scale-105 transition duration-300">

    <!-- Qidiruv va Sarlavha -->

            </div>
        </div>
    </section>

    <!-- Mahsulotlar Ro'yxati -->

    </div>

                            <span class="text-[10px] text-orange-500 font-black bg-orange-500/10 px-2 py-0.5 rounded-md border border-orange-500/20">UZCARD</span>
                            <i class="fa-regular fa-copy text-gray-400 group-hover:text-orange-500 transition"></i>

                        <!-- Nusxalandi Toast xabarchasi -->

                            Nusxalandi! 📋
                        </div>
                    </div>
                </div>

                <!-- Screenshot yuklash joyi -->
                <div>
                    <label class="text-xs text-gray-400" data-translate="uploadReceiptLabel">To'lov cheki (Screenshot):</label>
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-gray-700 border-dashed rounded-xl cursor-pointer bg-[#242424] hover:bg-[#2d2d2d] transition mt-1">
                        <div class="flex flex-col items-center justify-center pt-2">
                            <i class="fa-solid fa-file-invoice-dollar text-gray-400 text-xl mb-1"></i>
                            <p class="text-[10px] text-gray-400" id="receipt-upload-text" data-translate="uploadReceiptBtn">Chekni yuklash</p>
                        </div>
                        <input type="file" id="order-receipt-file" accept="image/*" class="hidden" onchange="previewReceiptImage(event)">
                    </label>
                    <div id="receipt-preview-container" class="mt-2 hidden">
                        <img id="receipt-preview" src="" class="w-full h-20 object-cover rounded-lg border border-gray-700">
                    </div>
                </div>

                <input type="text" id="customer-name" class="w-full bg-[#242424] p-3 rounded-xl border border-gray-700" data-translate-placeholder="namePlaceholder">
                <input type="tel" id="customer-phone" class="w-full bg-[#242424] p-3 rounded-xl border border-gray-700" value="+998">
                
                <button onclick="sendOrder()" class="w-full bg-orange-600 py-3 rounded-xl font-bold hover:bg-orange-500 transition" data-translate="confirmOrder">Buyurtmani Tasdiqlash</button>
            </div>
        </div>
    </div>

                alertFillOrder: "Введите имя, телефон и загрузите чек оплаты.",
                promoApplied: "Промокод успешно применен!",

                copiedToastText: "Скопировано! 📋"
            }
        };

        let currentLang = localStorage.getItem('alo_lang') || 'uz';
        let uploadedImageBase64 = "";
        let uploadedReceiptBase64 = "";

        let products = JSON.parse(localStorage.getItem('alo_products')) || [
            { id: 1, name: "Smartfon S21 5G", desc: "Zor holatda, o'yinlar uchun ideal FPS beradi. 5G internet ishlaydi.", price: 5500000, img: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=500", promo: "ALO10", promoPrice: 5000000 },
            { id: 2, name: "Premium Krossovka", desc: "Sport va kundalik kiyish uchun qulay, yumshoq taglikli krossovka.", price: 450000, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500", promo: "", promoPrice: null }
        ];

        let orders = JSON.parse(localStorage.getItem('alo_orders')) || [];
        let selectedProduct = null;
        let finalPrice = 0;
        let isAdminLoggedIn = false;

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('alo_lang', lang);
            
            document.getElementById('lang-uz').className = lang === 'uz' ? 'px-3 py-1 rounded-lg text-xs font-bold bg-orange-600 text-white' : 'px-3 py-1 rounded-lg text-xs font-bold text-gray-400 hover:text-white';
            document.getElementById('lang-ru').className = lang === 'ru' ? 'px-3 py-1 rounded-lg text-xs font-bold bg-orange-600 text-white' : 'px-3 py-1 rounded-lg text-xs font-bold text-gray-400 hover:text-white';

            document.querySelectorAll('[data-translate]').forEach(elem => {
                const key = elem.getAttribute('data-translate');
                if (translations[lang][key]) { elem.innerText = translations[lang][key]; }
            });

            document.querySelectorAll('[data-translate-placeholder]').forEach(elem => {
                const key = elem.getAttribute('data-translate-placeholder');
                if (translations[lang][key]) { elem.setAttribute('placeholder', translations[lang][key]); }
            });

            // Toast matnini tarjimaga moslash
            document.getElementById('copy-toast').innerText = translations[lang].copiedToastText;

            displayProducts();
            displayOrders();
        }

        // --- BUFERGA NUSXALASH FUNKSIYASI ---
        function copyCardNumber() {
            const rawCardNum = "5614687306835365";
            
            // Clipboard API orqali buferga saqlash
            navigator.clipboard.writeText(rawCardNum).then(() => {
                const toast = document.getElementById('copy-toast');
                
                // Animatsiyani ko'rsatish
                toast.classList.remove('opacity-0');
                toast.classList.add('opacity-100', '-translate-y-2');
                
                // 1.5 soniyadan keyin yashirish
                setTimeout(() => {
                    toast.classList.remove('opacity-100', '-translate-y-2');
                    toast.classList.add('opacity-0');
                }, 1500);
            }).catch(err => {
                console.error("Nusxalashda xatolik yuz berdi:", err);
            });
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImageBase64 = e.target.result;
                    const preview = document.getElementById('img-preview');
                    preview.src = uploadedImageBase64;
                    document.getElementById('img-preview-container').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function previewReceiptImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedReceiptBase64 = e.target.result;
                    const preview = document.getElementById('receipt-preview');
                    preview.src = uploadedReceiptBase64;
                    document.getElementById('receipt-preview-container').classList.remove('hidden');
                    document.getElementById('receipt-upload-text').innerText = "Rasm tanlandi ✅";
                }
                reader.readAsDataURL(file);
            }
        }

        function formatMoney(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " so'm";
        }

        function openFullscreenImage(imgSrc, titleText) {
            const lightbox = document.getElementById('lightbox-modal');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxTitle = document.getElementById('lightbox-title');

            lightboxImg.src = imgSrc;
            lightboxTitle.innerText = titleText;

            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');

            lightboxImg.classList.remove('bubble-flip-in');
            void lightboxImg.offsetWidth;
            lightboxImg.classList.add('bubble-flip-in');
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox-modal');
            lightbox.classList.add('hidden');
            lightbox.classList.remove('flex');
        }

        function displayProducts(filteredProducts = products) {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            
            filteredProducts.forEach(prod => {
                list.innerHTML += `
                    <div class="card-3d bg-[#1a1a1a] rounded-2xl overflow-hidden border border-orange-500/10 p-4 relative flex flex-col justify-between">
                        <div class="preserve-3d flex flex-col h-full">
                            <div onclick="openFullscreenImage('${prod.img}', '${prod.name}')" class="group relative w-full h-44 rounded-xl mb-3 overflow-hidden cursor-zoom-in bg-black/40 border border-gray-800">
                                <img src="${prod.img}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110" alt="${prod.name}">
                                <div class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 flex items-center justify-center transition duration-300">
                                    <div class="w-10 h-10 bg-orange-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-orange-500/40">
                                        <i class="fa-solid fa-maximize text-sm"></i>
                                    </div>
                                </div>
                            </div>
                            <h4 class="text-md font-bold mb-1">${prod.name}</h4>
                            <p class="text-xs text-gray-400 mb-3 line-clamp-2">${prod.desc || ''}</p>
                            <div class="flex flex-col mb-4">
                                <span class="text-orange-500 font-black text-lg">${formatMoney(prod.price)}</span>
                                ${prod.promo ? `<span class="text-[10px] text-green-500 mt-1"><i class="fa-solid fa-tag mr-1"></i>${translations[currentLang].promoCodeTxt}: ${prod.promo}</span>` : ''}
                            </div>
                            <div class="mt-auto flex gap-2">
                                <button onclick="openOrderModal(${prod.id})" class="flex-1 bg-gradient-to-r from-orange-600 to-orange-500 py-2 rounded-xl text-sm font-bold hover:from-orange-500 hover:to-orange-400 transition">
                                    ${translations[currentLang].buyBtn}
                                </button>
                                ${isAdminLoggedIn ? `
                                    <button onclick="deleteProduct(${prod.id})" class="bg-red-600/20 text-red-500 p-2 rounded-xl hover:bg-red-600 hover:text-white transition">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function searchProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            displayProducts(filtered);
        }

        function toggleAdminModal() {
            const modal = document.getElementById('admin-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        function checkPassword() {
            const pass = document.getElementById('admin-password').value;
            if (pass === 'alo2026') {
                isAdminLoggedIn = true;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                displayProducts();
                displayOrders();
                alert(translations[currentLang].alertLoginSuccess);
            } else {
                alert(translations[currentLang].alertLoginError);
            }
        }

        function addNewProduct() {
            const name = document.getElementById('prod-name').value;
            const desc = document.getElementById('prod-desc').value;
            const priceVal = parseFloat(document.getElementById('prod-price').value);
            const promo = document.getElementById('prod-promo').value.trim();
            const promoPrice = parseFloat(document.getElementById('prod-promo-price').value) || null;

            if (name && priceVal && uploadedImageBase64) {
                const newProd = {
                    id: Date.now(),
                    name: name,
                    desc: desc,
                    price: priceVal,
                    img: uploadedImageBase64,
                    promo: promo,
                    promoPrice: promoPrice
                };
                products.push(newProd);
                localStorage.setItem('alo_products', JSON.stringify(products));
                displayProducts();
                
                document.getElementById('prod-name').value = '';
                document.getElementById('prod-desc').value = '';
                document.getElementById('prod-price').value = '';
                document.getElementById('prod-promo').value = '';
                document.getElementById('prod-promo-price').value = '';
                document.getElementById('prod-img-file').value = '';
                document.getElementById('img-preview-container').classList.add('hidden');
                uploadedImageBase64 = "";
                alert(translations[currentLang].alertAddSuccess);
            } else {
                alert(translations[currentLang].alertFillFields);
            }
        }

        function deleteProduct(id) {
            if(confirm(translations[currentLang].alertDeleteConfirm)) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('alo_products', JSON.stringify(products));
                displayProducts();
            }
        }

        function displayOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '';

            if (orders.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 text-xs py-10">${translations[currentLang].noOrders}</p>`;
                return;
            }

            orders.slice().reverse().forEach(order => {
                container.innerHTML += `
                    <div class="bg-[#242424] p-3.5 rounded-xl border border-gray-800 relative">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-xs text-orange-500 font-bold">${order.time}</span>
                            <button onclick="deleteOrder(${order.id})" class="text-gray-500 hover:text-red-500 transition text-xs"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <h5 class="text-sm font-bold text-gray-200 mb-1">${order.productName}</h5>
                        <p class="text-xs text-gray-400 mb-0.5"><span class="font-semibold text-gray-300">Mijoz:</span> ${order.customerName}</p>
                        <p class="text-xs text-gray-400 mb-2"><span class="font-semibold text-gray-300">Tel:</span> <a href="tel:${order.customerPhone}" class="text-blue-400 underline">${order.customerPhone}</a></p>
                        
                        ${order.receipt ? `
                            <div class="mb-3">
                                <span class="text-[10px] text-gray-400 block mb-1 font-bold">YUKLANGAN CHEK:</span>
                                <div onclick="openFullscreenImage('${order.receipt}', '${translations[currentLang].receiptTitle} - ${order.customerName}')" class="relative w-24 h-24 rounded-lg overflow-hidden border border-gray-700 cursor-zoom-in hover:border-orange-500 transition">
                                    <img src="${order.receipt}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition">
                                        <i class="fa-solid fa-eye text-white text-xs"></i>
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        <div class="flex justify-between items-center mt-2 pt-2 border-t border-gray-800/50">
                            <span class="text-xs text-gray-400">Summa:</span>
                            <span class="text-sm font-black text-green-500">${formatMoney(order.price)}</span>
                        </div>
                    </div>
                `;
            });
        }

        function deleteOrder(id) {
            if (confirm(translations[currentLang].alertDeleteConfirm)) {
                orders = orders.filter(o => o.id !== id);
                localStorage.setItem('alo_orders', JSON.stringify(orders));
                displayOrders();
            }
        }

        function clearAllOrders() {
            if (confirm(translations[currentLang].alertDeleteConfirm)) {
                orders = [];
                localStorage.setItem('alo_orders', JSON.stringify(orders));
                displayOrders();
            }
        }

        function openOrderModal(productId) {
            const prod = products.find(p => p.id === productId);
            if (!prod) return;

            selectedProduct = prod;
            finalPrice = prod.price;

            document.getElementById('order-item-title').innerText = prod.name;
            document.getElementById('order-item-desc').innerText = prod.desc || '';
            document.getElementById('order-display-price').innerText = formatMoney(finalPrice);
            
            const promoContainer = document.getElementById('promo-input-container');
            const promoInput = document.getElementById('promo-code-input');
            const promoMsg = document.getElementById('promo-message');
            
            promoInput.value = '';
            promoMsg.classList.add('hidden');

            if (prod.promo) { promoContainer.classList.remove('hidden'); } 
            else { promoContainer.classList.add('hidden'); }

            document.getElementById('order-receipt-file').value = '';
            document.getElementById('receipt-preview-container').classList.add('hidden');
            document.getElementById('receipt-upload-text').innerText = translations[currentLang].uploadReceiptBtn;
            uploadedReceiptBase64 = "";

            const modal = document.getElementById('order-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeOrderModal() {
            const modal = document.getElementById('order-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function applyPromo() {
            const code = document.getElementById('promo-code-input').value.trim();
            const promoMsg = document.getElementById('promo-message');

            if (selectedProduct && code.toLowerCase() === selectedProduct.promo.toLowerCase()) {
                finalPrice = selectedProduct.promoPrice;
                document.getElementById('order-display-price').innerText = formatMoney(finalPrice);
                promoMsg.innerText = translations[currentLang].promoApplied;
                promoMsg.className = "text-xs mt-1 text-green-500 block";
            } else {
                finalPrice = selectedProduct.price;
                document.getElementById('order-display-price').innerText = formatMoney(finalPrice);
                promoMsg.innerText = translations[currentLang].promoInvalid;
                promoMsg.className = "text-xs mt-1 text-red-500 block";
            }
        }

        function sendOrder() {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;

            if (!name || phone.length < 9 || !uploadedReceiptBase64) {
                alert(translations[currentLang].alertFillOrder);
                return;
            }

            const now = new Date();
            const timeString = `${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()} | ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            const newOrder = {
                id: Date.now(),
                productName: selectedProduct.name,
                price: finalPrice,
                customerName: name,
                customerPhone: phone,
                time: timeString,
                receipt: uploadedReceiptBase64
            };

            orders.push(newOrder);
            localStorage.setItem('alo_orders', JSON.stringify(orders));

            const text = `🔔 **YANGI BUYURTMA (A'lo Market)**\n\n` +
                         `📦 **Mahsulot:** ${selectedProduct.name}\n` +
                         `💰 **Narxi:** ${formatMoney(finalPrice)}\n` +
                         `👤 **Mijoz:** ${name}\n` +
                         `📞 **Telefon:** ${phone}\n` +
                         `🧾 **To'lov holati:** Karta orqali to'landi (Skrinshot admin panelda).\n` +
                         `🕒 **Vaqt:** ${timeString}`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: text,
                    parse_mode: "Markdown"
                })
            })
            .then(() => {
                alert(translations[currentLang].alertOrderSuccess);
                closeOrderModal();
                document.getElementById('customer-name').value = '';
                document.getElementById('customer-phone').value = '+998';
                displayOrders();
            })
            .catch(() => {
                alert(translations[currentLang].alertOrderSuccess + " (Bazada saqlandi)");
                closeOrderModal();
                document.getElementById('customer-name').value = '';
                document.getElementById('customer-phone').value = '+998';
                displayOrders();
            });
        }

        changeLanguage(currentLang);
    </script>
</body>
</html>
