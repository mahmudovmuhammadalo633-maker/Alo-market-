<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A'lo Market Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Iconlar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css silliq animatsiyalar uchun -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            background: radial-gradient(circle at top, #1f1f1f 0%, #0d0d0d 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        /* 120Hz silliq ishlashi uchun GPU tezlatgichidan foydalanamiz */
        .smooth-gpu {
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            will-change: transform, opacity;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* 3D Tovar kartochkasi effekti */
        .product-card {
            perspective: 1000px;
        }
        .product-card-inner {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }
        .product-card:hover .product-card-inner {
            transform: translateY(-8px) rotateX(4deg) rotateY(2deg);
            box-shadow: 0 20px 40px rgba(249, 115, 22, 0.15);
        }
        /* Rasm 3D Zoom Animatsiyasi */
        #zoom-modal {
            backdrop-filter: blur(15px);
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #zoom-img {
            transform: scale(0.5) rotateY(30deg);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #zoom-modal.active #zoom-img {
            transform: scale(1) rotateY(0deg);
        }
        /* Chiroyli tugma animatsiyasi */
        .btn-animate {
            transition: all 0.2s ease;
        }
        .btn-animate:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-[#141414]/90 backdrop-blur-md sticky top-0 z-40 px-4 py-4 smooth-gpu">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-tr from-orange-600 to-amber-500 rounded-2xl flex items-center justify-center font-black text-2xl text-black shadow-lg shadow-orange-500/20 animate__animated animate__fadeInLeft">A</div>
                <div class="animate__animated animate__fadeInLeft">
                    <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-amber-400 italic tracking-wider">A'lo Market</h1>
                </div>
            </div>
            
            <div class="flex items-center gap-3 animate__animated animate__fadeInRight">
                <!-- Til Tanlash -->
                <div class="bg-[#1e1e1e] p-1 rounded-xl border border-gray-800 flex gap-1">
                    <button id="lang-uz" onclick="setLanguage('uz')" class="px-2.5 py-1 rounded-lg text-xs font-black transition-all bg-orange-500 text-black">UZ</button>
                    <button id="lang-ru" onclick="setLanguage('ru')" class="px-2.5 py-1 rounded-lg text-xs font-black transition-all text-gray-400">RU</button>
                </div>
                <!-- Admin -->
                <button onclick="openAdminPanel()" class="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-black font-extrabold px-4 py-2.5 rounded-xl text-xs flex items-center gap-1.5 shadow-lg shadow-orange-500/10 btn-animate">
                    <i class="fa-solid fa-lock-open text-xs"></i> <span data-key="adminBtn">Admin</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Katalog -->
    <main class="max-w-4xl mx-auto px-4 mt-8">
        <h2 class="text-xl font-black text-gray-300 mb-6 flex items-center gap-2.5 animate__animated animate__fadeInUp">
            <span class="w-2.5 h-6 bg-orange-500 rounded-full shadow-lg shadow-orange-500/50"></span> 
            <span data-key="catalogTitle">Mahsulotlar katalogi</span>
        </h2>
        
        <!-- Tovar ro'yxati -->
        <div id="products-list" class="grid grid-cols-1 sm:grid-cols-2 gap-6 smooth-gpu">
            <!-- Dinamik tovarlar yuklanadi -->
        </div>
    </main>

    <!-- 3D Zoom Rasm Modali -->
    <div id="zoom-modal" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-2 opacity-0" onclick="closeZoom()">
        <div class="relative w-full h-full flex items-center justify-center">
            <button class="absolute top-4 right-4 bg-white/10 hover:bg-white/20 text-white w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md transition-all">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
            <img id="zoom-img" class="max-w-full max-h-[90vh] object-contain rounded-3xl shadow-2xl border border-white/10 smooth-gpu" src="" alt="Full Screen">
        </div>
    </div>

    <!-- Buyurtma va To'lov Modali -->
    <div id="order-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md hidden z-50 flex items-center justify-center p-4 smooth-gpu">
        <div class="bg-[#181818] border border-gray-800 p-6 rounded-3xl w-full max-w-md shadow-2xl animate__animated animate__zoomIn animate__fast">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-2xl font-black text-orange-500 flex items-center gap-2">
                    <i class="fa-solid fa-circle-dollar-to-slot text-xl"></i> <span data-key="orderTitle">Buyurtma</span>
                </h3>
                <button onclick="closeOrderModal()" class="text-gray-400 hover:text-white bg-gray-900/50 w-8 h-8 rounded-full flex items-center justify-center border border-gray-800 btn-animate">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- Tovar nomi va narxi -->
            <div class="bg-[#0f0f0f] border border-gray-800 p-4 rounded-2xl mb-4 text-center">
                <p id="modal-product-name" class="font-bold text-white text-lg mb-1"></p>
                <p id="modal-product-price" class="text-2xl font-black text-orange-500"></p>
            </div>

            <!-- To'lov turi -->
            <div class="mb-5 p-4 bg-[#111] rounded-2xl border border-gray-800">
                <p class="text-xs text-gray-400 mb-2.5 font-bold uppercase tracking-wider" data-key="choosePayment">To'lov turini tanlang:</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setPaymentType('cash')" id="pay-cash" class="py-3 rounded-xl font-extrabold text-sm flex items-center justify-center gap-2 btn-animate bg-orange-500 text-black">
                        <i class="fa-solid fa-money-bill-wave"></i> <span data-key="payCash">Naqd pul</span>
                    </button>
                    <button onclick="setPaymentType('card')" id="pay-card" class="py-3 rounded-xl font-extrabold text-sm flex items-center justify-center gap-2 btn-animate bg-gray-800 text-gray-300">
                        <i class="fa-solid fa-credit-card"></i> <span data-key="payCard">Karta (-10%)</span>
                    </button>
                </div>
            </div>

            <!-- Karta Ma'lumotlari -->
            <div id="card-details" class="hidden mb-5 p-4 bg-gradient-to-br from-orange-600/15 to-amber-500/5 border border-orange-500/20 rounded-2xl animate__animated animate__fadeIn">
                <p class="text-orange-500 text-xs font-black uppercase tracking-wider mb-2" data-key="cardInfo">Karta Ma'lumotlari (Nusxa oling):</p>
                <div onclick="copyCardNumber()" class="bg-black/50 border border-orange-500/30 p-3.5 rounded-xl flex justify-between items-center cursor-pointer hover:border-orange-500 transition-all active:scale-[0.98]">
                    <div>
                        <code class="text-xl tracking-widest text-white font-bold block" id="card-digits">5614 6873 0683 5365</code>
                        <span class="text-[10px] text-gray-400 block mt-1">Egasining ismi: Mahmudov M.</span>
                    </div>
                    <button class="bg-orange-500 text-black w-8 h-8 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-copy text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Ma'lumotlarni kiritish formasi -->
            <form id="order-form" onsubmit="sendTelegramOrder(event)" class="space-y-4">
                <input type="hidden" id="form-product-title">
                <input type="hidden" id="form-product-price">
                
                <div>
                    <input type="text" id="cust-name" required class="w-full bg-[#0f0f0f] border border-gray-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all text-sm" placeholder="Ismingiz...">
                </div>
                <div>
                    <input type="tel" id="cust-phone" required class="w-full bg-[#0f0f0f] border border-gray-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all text-sm" placeholder="Telefoningiz...">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-black font-black py-4 rounded-xl shadow-lg shadow-orange-500/20 text-sm tracking-wide btn-animate flex items-center justify-center gap-2">
                    <span data-key="submitOrderBtn">Buyurtmani Tasdiqlash</span> <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Panel Modali (Maxfiy parolli) -->
    <div id="admin-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md hidden z-50 flex items-center justify-center p-4 smooth-gpu">
        <div class="bg-[#181818] border border-gray-800 p-6 rounded-3xl w-full max-w-md shadow-2xl animate__animated animate__zoomIn animate__fast">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-2xl font-black text-orange-500 flex items-center gap-2">
                    <i class="fa-solid fa-circle-plus"></i> <span data-key="adminPanelTitle">Yangi Mahsulot</span>
                </h3>
                <button onclick="closeAdminPanel()" class="text-gray-400 hover:text-white bg-gray-900/50 w-8 h-8 rounded-full flex items-center justify-center border border-gray-800 btn-animate">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <form onsubmit="addNewProduct(event)" class="space-y-4">
                <div>
                    <input type="text" id="new-p-title" required class="w-full bg-[#0f0f0f] border border-gray-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Mahsulot nomi (masalan: S21 5G)">
                </div>
                <div>
                    <input type="number" id="new-p-price" required class="w-full bg-[#0f0f0f] border border-gray-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Narxi (faqat sonlarda, masalan: 5500000)">
                </div>
                <div>
                    <input type="url" id="new-p-image" required class="w-full bg-[#0f0f0f] border border-gray-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Rasm linki (ImgBB linki)">
                </div>
                <div>
                    <textarea id="new-p-desc" rows="3" required class="w-full bg-[#0f0f0f] border border-gray-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Mahsulot tavsifi..."></textarea>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-black font-black py-4 rounded-xl shadow-lg shadow-orange-500/20 text-sm btn-animate">
                    Qo'shish <i class="fa-solid fa-circle-check ml-1"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // SOZLAMALAR
        const BOT_TOKEN = '8866120283:AAFjMGqmZuqZ9xfMZCG_Fuh3zTYvY0hcHNI'; // Sizning Bot Tokeningiz
        const CHAT_ID = '5170028009'; // Sizning Chat ID raqamingiz
        const ADMIN_PIN = '7777'; // Maxfiy admin parol

        let currentLang = 'uz';
        let currentProductPrice = 0;
        let selectedPayment = 'cash'; // Boshlang'ich naqd

        // Tillar lug'ati
        const translations = {
            uz: {
                adminBtn: "Admin",
                catalogTitle: "Mahsulotlar katalogi",
                buyBtn: "Sotib olish",
                orderTitle: "Buyurtma berish",
                choosePayment: "To'lov usulini tanlang:",
                payCash: "Naqd pul",
                payCard: "Karta (-10%)",
                cardInfo: "Karta Ma'lumotlari (Nusxa oling):",
                submitOrderBtn: "Buyurtmani Tasdiqlash",
                adminPanelTitle: "Yangi Mahsulot Qo'shish",
                placeholderName: "Ismingiz...",
                placeholderPhone: "Telefoningiz...",
                discountMsg: "10% Chegirma!"
            },
            ru: {
                adminBtn: "Админ",
                catalogTitle: "Каталог товаров",
                buyBtn: "Купить",
                orderTitle: "Оформить заказ",
                choosePayment: "Выберите способ оплаты:",
                payCash: "Наличные",
                payCard: "Карта (-10%)",
                cardInfo: "Данные карты (Скопируйте):",
                submitOrderBtn: "Подтвердить заказ",
                adminPanelTitle: "Добавить новый товар",
                placeholderName: "Ваше имя...",
                placeholderPhone: "Ваш телефон...",
                discountMsg: "Скидка 10%!"
            }
        };

        // Boshlang'ich tovarlar
        const defaultProducts = [
            {
                id: 1,
                title_uz: "Smartfon S21 5G",
                title_ru: "Смартфон S21 5G",
                desc_uz: "Zor holatda, o'yinlar uchun ideal FPS beradi. 5G internet ishlaydi.",
                desc_ru: "В отличном состоянии, выдает идеальный FPS для игр. 5G интернет работает.",
                price: 5500000,
                image: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 2,
                title_uz: "Premium Krossovka",
                title_ru: "Премиум Кроссовки",
                desc_uz: "Sport va kundalik kiyish uchun qulay, yumshoq taglikli krossovka.",
                desc_ru: "Удобные кроссовки на мягкой подошве для спорта и повседневной носки.",
                price: 450000,
                image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=600&q=80"
            }
        ];

        // Tilni o'zgartirish funksiyasi
        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-uz').className = lang === 'uz' ? "px-2.5 py-1 rounded-lg text-xs font-black transition-all bg-orange-500 text-black" : "px-2.5 py-1 rounded-lg text-xs font-black transition-all text-gray-400";
            document.getElementById('lang-ru').className = lang === 'ru' ? "px-2.5 py-1 rounded-lg text-xs font-black transition-all bg-orange-500 text-black" : "px-2.5 py-1 rounded-lg text-xs font-black transition-all text-gray-400";
            
            // Tarjima elementlarini yangilash
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });

            // Input placholderlarni tarjima qilish
            document.getElementById('cust-name').placeholder = translations[lang].placeholderName;
            document.getElementById('cust-phone').placeholder = translations[lang].placeholderPhone;

            renderProducts();
        }

        // Tovar yuklash funksiyasi
        function renderProducts() {
            const productsList = document.getElementById('products-list');
            productsList.innerHTML = '';

            let customProducts = JSON.parse(localStorage.getItem('customProducts')) || [];
            const allProducts = [...defaultProducts, ...customProducts];

            allProducts.forEach((product, index) => {
                const title = currentLang === 'uz' ? (product.title_uz || product.title) : (product.title_ru || product.title);
                const desc = currentLang === 'uz' ? (product.desc_uz || product.desc) : (product.desc_ru || product.desc);
                const formattedPrice = product.price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " so'm";
                
                const card = `
                    <div class="product-card bg-[#151515] border border-gray-900 rounded-3xl overflow-hidden shadow-xl smooth-gpu animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                        <div class="product-card-inner">
                            <div class="relative overflow-hidden group cursor-pointer" onclick="openZoom('${product.image}')">
                                <img src="${product.image}" alt="${title}" class="w-full h-56 object-cover smooth-gpu group-hover:scale-105">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                                    <i class="fa-solid fa-magnifying-glass-plus text-3xl text-orange-500 scale-75 group-hover:scale-100 transition-all"></i>
                                </div>
                            </div>
                            <div class="p-5 flex flex-col justify-between">
                                <div>
                                    <h3 class="text-xl font-black text-white mb-2 tracking-wide">${title}</h3>
                                    <p class="text-sm text-gray-400 mb-4 line-clamp-3 leading-relaxed">${desc}</p>
                                    <div class="text-2xl font-black text-orange-500 mb-4">${formattedPrice}</div>
                                </div>
                                <button onclick="openOrderModal('${title}', ${product.price})" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-black font-black py-3.5 rounded-2xl shadow-lg shadow-orange-500/10 btn-animate text-sm">
                                    ${translations[currentLang].buyBtn} <i class="fa-solid fa-bag-shopping ml-1"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                productsList.innerHTML += card;
            });
        }

        // 3D Rasm Zoom
        function openZoom(imageSrc) {
            const modal = document.getElementById('zoom-modal');
            const img = document.getElementById('zoom-img');
            img.src = imageSrc;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('active');
                modal.style.opacity = '1';
            }, 50);
        }

        function closeZoom() {
            const modal = document.getElementById('zoom-modal');
            modal.style.opacity = '0';
            modal.classList.remove('active');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Buyurtma modalini ochish
        function openOrderModal(title, price) {
            currentProductPrice = price;
            document.getElementById('form-product-title').value = title;
            document.getElementById('form-product-price').value = price;
            document.getElementById('modal-product-name').innerText = title;
            
            // Boshlang'ich to'lovni naqd qilish
            setPaymentType('cash');
            
            document.getElementById('order-modal').classList.remove('hidden');
        }

        function closeOrderModal() {
            document.getElementById('order-modal').classList.add('hidden');
        }

        // To'lov turini o'rnatish (10% skidka hisoblash mantiqi)
        function setPaymentType(type) {
            selectedPayment = type;
            const btnCash = document.getElementById('pay-cash');
            const btnCard = document.getElementById('pay-card');
            const cardDetails = document.getElementById('card-details');
            const priceEl = document.getElementById('modal-product-price');

            if (type === 'cash') {
                btnCash.className = "py-3 rounded-xl font-extrabold text-sm flex items-center justify-center gap-2 btn-animate bg-orange-500 text-black w-full";
                btnCard.className = "py-3 rounded-xl font-extrabold text-sm flex items-center justify-center gap-2 btn-animate bg-gray-800 text-gray-300 w-full";
                cardDetails.classList.add('hidden');
                
                // Asl narx
                const formatPrice = currentProductPrice.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " so'm";
                priceEl.innerText = formatPrice;
            } else {
                btnCash.className = "py-3 rounded-xl font-extrabold text-sm flex items-center justify-center gap-2 btn-animate bg-gray-800 text-gray-300 w-full";
                btnCard.className = "py-3 rounded-xl font-extrabold text-sm flex items-center justify-center gap-2 btn-animate bg-orange-500 text-black w-full";
                cardDetails.classList.remove('hidden');

                // 10% skidka hisoblash
                const discounted = currentProductPrice * 0.9;
                const formatPrice = Math.round(discounted).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + ` so'm (${translations[currentLang].discountMsg})`;
                priceEl.innerText = formatPrice;
            }
        }

        // Karta raqamini nusxalash
        function copyCardNumber() {
            const cardNum = "5614687306835365";
            navigator.clipboard.writeText(cardNum).then(() => {
                alert(currentLang === 'uz' ? "Karta raqami nusxalandi!" : "Номер карты скопирован!");
            }).catch(err => {
                console.error("Nusxalashda xatolik:", err);
            });
        }

        // Parolli Admin Panel ochish
        function openAdminPanel() {
            const password = prompt(currentLang === 'uz' ? "Maxfiy admin parolini kiriting:" : "Введите секретный пароль администратора:");
            if (password === ADMIN_PIN) {
                document.getElementById('admin-modal').classList.remove('hidden');
            } else if (password !== null) {
                alert(currentLang === 'uz' ? "Parol noto'g'ri!" : "Неверный пароль!");
            }
        }

        function closeAdminPanel() {
            document.getElementById('admin-modal').classList.add('hidden');
        }

        // Yangi tovar qo'shish (Xotirada saqlanadi)
        function addNewProduct(e) {
            e.preventDefault();
            const title = document.getElementById('new-p-title').value;
            const price = parseInt(document.getElementById('new-p-price').value);
            const image = document.getElementById('new-p-image').value;
            const desc = document.getElementById('new-p-desc').value;

            const newProduct = {
                id: Date.now(),
                title_uz: title,
                title_ru: title,
                desc_uz: desc,
                desc_ru: desc,
                price: price,
                image: image
            };

            let customProducts = JSON.parse(localStorage.getItem('customProducts')) || [];
            customProducts.push(newProduct);
            localStorage.setItem('customProducts', JSON.stringify(customProducts));

            e.target.reset();
            closeAdminPanel();
            renderProducts();
            alert(currentLang === 'uz' ? "Yangi mahsulot muvaffaqiyatli qo'shildi!" : "Новый товар успешно добавлен!");
        }

        // Telegramga buyurtma jo'natish
        function sendTelegramOrder(e) {
            e.preventDefault();
            
            const productTitle = document.getElementById('form-product-title').value;
            const originalPrice = parseInt(document.getElementById('form-product-price').value);
            const clientName = document.getElementById('cust-name').value;
            const clientPhone = document.getElementById('cust-phone').value;

            let finalPrice = originalPrice;
            let paymentText = "Naqd pul";

            if (selectedPayment === 'card') {
                finalPrice = originalPrice * 0.9;
                paymentText = "Karta (10% Chegirma bilan)";
            }

            const formattedPrice = Math.round(finalPrice).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " so'm";

            const message = `
🛍 *A'LO MARKET - YANGI BUYURTMA!*
━━━━━━━━━━━━━━━━━━━━
📦 *Mahsulot:* ${productTitle}
💰 *Yakuniy Narx:* ${formattedPrice}
💳 *To'lov turi:* ${paymentText}
━━━━━━━━━━━━━━━━━━━━
👤 *Haridor:* ${clientName}
📞 *Telefon:* ${clientPhone}
`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(res => {
                if (res.ok) {
                    alert(currentLang === 'uz' ? "Muvaffaqiyatli! Buyurtma qabul qilindi." : "Успешно! Заказ принят.");
                    closeOrderModal();
                    document.getElementById('order-form').reset();
                } else {
                    alert("Telegram xatolik berdi.");
                }
            })
            .catch(() => {
                alert("Aloqa xatosi!");
            });
        }

        // Yuklanganda ishga tushish
        window.onload = () => {
            setLanguage('uz');
        };
    </script>
</body>
